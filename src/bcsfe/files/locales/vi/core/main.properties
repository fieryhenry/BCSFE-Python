# filename="main.properties"
# Full documentation: https://codeberg.org/fieryhenry/ExampleEditorLocale#format-of-the-properties-files
# color formatting
#
# <@p> = primary color
# <@s> = secondary color
# <@t> = tertiary color
# <@q> = quaternary color
# <@e> = error color
# <@w> = warning color
# <@su> = success color
#
# </> = close current color
# When coloring, use the above formatting tags, not the actual color codes / names so that different colors can be used for different themes.
# You should only use the actual color codes / names if the exact colors are important, such coloring a target red talent orb as red.
# If you want to write < or > or / in the text, escape them with a backslash (\) e.g. \< or \> or \/
#
# <#rrggbb> = hex color
#
# <w> = white
# <bl> = black
# <r> = red
# <g> = green
# <b> = blue
# <y> = yellow
# <m> = magenta
# <c> = cyan
# <dy> = dark yellow
# <dg> = dark grey
# <db> = dark blue
# <dc> = dark cyan
# <dm> = dark magenta
# <dr> = dark red
# <dgn> = dark green
# <lg> = light grey
# <o> = orange

downloading=<@su>Đang tải <@s>{file_name}</> từ <@s>{pack_name}</> phiên bản <@s>{version}</> quốc gia <@s>{country_code}</>
failed_to_download_game_data=<@e>Không thể tải game data <@s>{file_name}</> từ <@s>{pack_name}</> phiên bản <@s>{version}</> quốc gia <@s>{country_code}</>. Url: <@s>{url}</>. Hãy kiểm tra kết nối internet.</>
failed_to_get_game_versions=<@e>Không thể lấy danh sách phiên bản game. Hãy kiểm tra kết nối internet.</>
no_device_error=<@e>Không tìm thấy thiết bị nào được kết nối</>
no_package_name_error=<@e>Không tìm thấy gói Battle Cats nào. Thiết bị có thể chưa root hoặc bạn chưa vào Cat Base ít nhất một lần.</>
exit=Thoát
tkinter_not_found=<@e>Không tìm thấy tkinter. Nếu không dùng trên mobile, hãy cài đặt và thử lại.</>
tkinter_not_found_enter_path_file=Vui lòng nhập đường dẫn của file {initialfile}:
tkinter_not_found_enter_path_file_save=Vui lòng nhập đường dẫn để lưu file {initialfile}:
tkinter_not_found_enter_path_dir=Vui lòng nhập đường dẫn thư mục {initialdir} thay thế:
discord_url=https://discord.gg/DvmMgvn5ZB

welcome=
><@t>Chào mừng đến với <@s>Battle Cats Save File Editor</>!
>Được tạo bởi <@s>fieryhenry</>
>
>Codeberg: <@s>https://codeberg.org/fieryhenry/BCSFE-Python</>
>Discord: <@s>https://discord.gg/DvmMgvn5ZB</> - Vui lòng báo lỗi tại <@s>#bug-reports</> và góp ý tại <@s>#suggestions</>
>Ủng hộ: <@s>https://ko-fi.com/fieryhenry</>
>
>Vị trí file cấu hình: <@s>{config_path}</>
>
>{theme_text}
>
>{locale_text}
>
><@q>Cảm ơn:
>- <@s>Lethal's editor</> đã truyền cảm hứng và giúp tôi tìm cách vá save file cũng như chỉnh sửa cf/xp ban đầu: <@s>https://www.reddit.com/r/BattleCatsCheats/comments/djehhn/editoren/</>
>- Code của <@s>Beeven</> và <@s>csehydrogen</> giúp tôi hiểu cách vá save data: https://github.com/beeven/battlecats và https://github.com/csehydrogen/BattleCatsHacker
>- Tất cả những người đã ủng hộ tôi, giúp tôi có động lực tiếp tục phát triển chương trình: <@s>https://ko-fi.com/fieryhenry</>
>- Toàn thể cộng đồng Discord vì đã cung cấp save, báo lỗi, góp ý tính năng mới và là một cộng đồng tuyệt vời: <@s>https://discord.gg/DvmMgvn5ZB</></>
>
><@w>Nếu bạn trả tiền cho chương trình này thì bạn đã bị lừa. Đây là phần mềm miễn phí và mã nguồn mở.</>
>
><@w>Sử dụng công cụ này hoàn toàn tự chịu rủi ro. Tôi không chịu trách nhiệm cho bất kỳ lệnh cấm nào hoặc hỏng hóc save file.
>Trình chỉnh sửa đã cố gắng ngăn chặn tối đa, nhưng tôi không thể đảm bảo 100% save file của bạn sẽ an toàn.
>Nếu save bị hỏng, bạn vẫn có thể báo lỗi trên Discord.
>Tôi khuyên bạn nên sao lưu save file trước khi chỉnh sửa.</>